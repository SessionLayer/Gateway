# SessionLayer Gateway — data-path RED alert rules (Session 23, Part B).
#
# Fed by the span-metrics collector (otel-collector-spanmetrics.yaml), which turns
# the S21 Gateway/Agent spans into `calls_total` + `duration_milliseconds_bucket`
# with dimensions {service_name, span_name, span_kind, status_code,
# sessionlayer_outcome, sessionlayer_access_model}. These page on the Tier-0
# data-path health an operator needs at 3am; the CP SLOs live in the CP rules file.
groups:
  - name: sessionlayer-gateway-red
    rules:
      # RATE — session attempts flowing through the Gateway root span.
      - alert: GatewayNoSessionTraffic
        expr: sum(rate(calls_total{service_name="sessionlayer-gateway",span_name="gateway.session"}[10m])) == 0
        for: 15m
        labels: { severity: warn }
        annotations:
          summary: "Gateway handled no sessions for 15m"
          description: "Either idle or the outer SSH listener / LB path is down. Correlate with the L4 LB and PROXY-v2 rejection rate."

      # ERRORS — session-establishment error ratio (fail-closed denials show here as
      # ERROR spans; a spike means legitimate access is being turned away).
      - alert: GatewaySessionErrorRatioHigh
        expr: >
          sum(rate(calls_total{service_name="sessionlayer-gateway",span_name="gateway.session",status_code="STATUS_CODE_ERROR"}[5m]))
          /
          clamp_min(sum(rate(calls_total{service_name="sessionlayer-gateway",span_name="gateway.session"}[5m])), 0.001)
          > 0.25
        for: 10m
        labels: { severity: page }
        annotations:
          summary: "Gateway session error ratio > 25%"
          description: "{{ $value | humanizePercentage }} of session attempts end in an error span. Deny is expected policy; a broad ERROR spike points at CP-unreachable fail-closed (NFR-2), CA-signer down, or host-verify failures — check cp.authorize / cp.cert_sign / host_verify child spans."

      # ERRORS — host-identity verification failures (no-TOFU aborts). A spike is
      # either a real MITM attempt or a node-rekey/enrollment drift.
      - alert: GatewayHostVerifyFailureSpike
        expr: >
          sum(rate(calls_total{service_name="sessionlayer-gateway",span_name="host_verify",status_code="STATUS_CODE_ERROR"}[10m])) > 0
        for: 10m
        labels: { severity: page, security: host-identity }
        annotations:
          summary: "Gateway node host-identity verification is failing (no-TOFU abort)"
          description: "host_verify spans are erroring ({{ $value | humanize }}/s). Either a node presented an unenrolled host key (possible MITM — investigate) or a node was re-keyed without re-enrollment. The Gateway correctly aborts (§9.3); sessions to that node are down until trust is reconciled."

      # DURATION — inner-leg reach + bridge setup p95 against the NFR-4 budget.
      - alert: GatewayNodeConnectP95High
        expr: >
          histogram_quantile(0.95,
            sum by (le) (rate(duration_milliseconds_bucket{service_name="sessionlayer-gateway",span_name="node.connect"}[5m]))
          ) > 500
        for: 10m
        labels: { severity: warn }
        annotations:
          summary: "Gateway node.connect p95 > 500 ms"
          description: "Reaching node sshd (agentless dial or agent dial-back) p95 = {{ $value }}ms. Check node reachability / the coordination signal path (HA)."

      # SATURATION — Agent dial-back leg erroring (the outbound-agent connectivity
      # model losing its control channels degrades to node-unreachable, §10.3).
      - alert: AgentDialBackErrorSpike
        expr: >
          sum(rate(calls_total{service_name="sessionlayer-agent",span_name="agent.dial_back",status_code="STATUS_CODE_ERROR"}[10m])) > 0
        for: 10m
        labels: { severity: warn }
        annotations:
          summary: "Agent dial-back leg erroring"
          description: "Outbound-agent nodes may be losing Gateway control channels ({{ $value | humanize }}/s dial-back errors). If an agent loses ALL its Gateways the node is correctly 'unreachable' and degrades to out-of-band tooling — verify the ≥2 failure-domain-diverse channels (FR-HA-6)."
