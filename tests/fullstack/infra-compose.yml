# Self-contained infra for the full-stack cross-repo E2E (tests/fullstack/run.sh).
#
# The parent SessionLayer/ compose is NOT in any git repo, so CI (which checks out
# this repo alone, plus CP + Agent) cannot rely on it. This file bundles the only
# infra the single-instance topologies need — Postgres (the CP's store) and MinIO
# (the WORM recording store) — with images pinned to the parent stack's versions.
#
# Ports are ENV-overridable and default HIGH so a run can coexist with a developer's
# already-running parent dev stack on the standard 5432/9000. Every credential here
# is a DEV-ONLY placeholder (matches the CP's built-in dev defaults).
name: sl-fullstack

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: sessionlayer
      POSTGRES_PASSWORD: sessionlayer
      POSTGRES_DB: sessionlayer
      POSTGRES_INITDB_ARGS: "--data-checksums"
    ports:
      - "${FS_PG_PORT:-55432}:5432"
    volumes:
      - ./pg-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sessionlayer -d sessionlayer"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: sessionlayer
      MINIO_ROOT_PASSWORD: sessionlayer-dev-secret
    ports:
      - "${FS_MINIO_PORT:-59000}:9000"
      - "${FS_MINIO_CONSOLE_PORT:-59001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 5s
