# SessionLayer Gateway — release supply chain (Session 22 / NFR-7).
#
# On a `v*` tag: build the `gateway` binary REPRODUCIBLY, emit a CycloneDX SBOM,
# a SLSA build-provenance attestation, and keyless (OIDC) cosign signatures —
# no long-lived signing key. All third-party actions are SHA-pinned; the trailing
# `# vX.Y.Z` is the human tag. Owner rule (S1/S2): inventory + integrity, NEVER
# an NVD/OWASP scanner.
name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write # gh release upload
      id-token: write # keyless OIDC for cosign + provenance
      attestations: write # build-provenance attestation
    env:
      BIN: gateway
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler

      - name: Install Rust toolchain (pinned by rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # pinned commit
        with:
          toolchain: "1.95.0"

      - name: Install cargo-cyclonedx (SBOM)
        run: cargo install --locked --version 0.5.9 cargo-cyclonedx
      - name: Install cosign
        uses: sigstore/cosign-installer@d7543c93d881b35a8faa02e8e3605f69b7a1ce62 # v3.10.0

      # SOURCE_DATE_EPOCH (tagged commit) + remapping BOTH the workspace (incl. the
      # vendored third_party/russh) and the cargo registry out of the binary make
      # it byte-reproducible for an independent rebuilder. (Residual: the std
      # sysroot path — bounded by pinning the exact toolchain, documented.)
      - name: Compute deterministic build env
        run: |
          echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"
          echo "RUSTFLAGS=--remap-path-prefix=$PWD=/build --remap-path-prefix=${CARGO_HOME:-$HOME/.cargo}/registry=/registry" >> "$GITHUB_ENV"

      - name: Reproducible release build
        run: cargo build --release --locked --bin "$BIN"

      - name: Verify reproducibility (double-build digest match)
        run: |
          d1=$(sha256sum "target/release/$BIN" | awk '{print $1}')
          CARGO_TARGET_DIR="$RUNNER_TEMP/repro" cargo build --release --locked --bin "$BIN"
          d2=$(sha256sum "$RUNNER_TEMP/repro/release/$BIN" | awk '{print $1}')
          echo "digest #1: $d1"; echo "digest #2: $d2"
          if [ "$d1" != "$d2" ]; then echo "::error::release binary is not reproducible"; exit 1; fi
          rm -rf "$RUNNER_TEMP/repro"

      - name: Generate SBOM (CycloneDX 1.5, reproducible)
        run: |
          cargo cyclonedx -f json --spec-version 1.5 --all --describe binaries
          # Strip the nondeterministic metadata.timestamp + random serialNumber so
          # the SBOM is byte-reproducible (cargo-cyclonedx has no reproducible flag;
          # 0.5.9 also caps at spec 1.5). The workspace emits per-package SBOMs.
          jq -S 'del(.metadata.timestamp) | del(.serialNumber)' "gateway/${BIN}_bin.cdx.json" > "${BIN}.cdx.json"
          jq -e '.bomFormat=="CycloneDX" and .specVersion=="1.5" and (.components|length>0)' "${BIN}.cdx.json" >/dev/null

      - name: Attest build provenance (SLSA)
        id: attest
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-path: |
            target/release/gateway
            gateway.cdx.json

      - name: Keyless cosign signatures (binary + SBOM)
        run: |
          cosign sign-blob --yes --new-bundle-format \
            --bundle "${BIN}.cosign.sigstore.json" "target/release/$BIN"
          cosign sign-blob --yes --new-bundle-format \
            --bundle "${BIN}.cdx.json.cosign.sigstore.json" "${BIN}.cdx.json"

      - name: Assemble release artifacts
        run: |
          cp "target/release/$BIN" "$BIN"
          cp "${{ steps.attest.outputs.bundle-path }}" "${BIN}.provenance.sigstore.json"
          sha256sum "$BIN" "${BIN}.cdx.json" > SHA256SUMS

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }} # via env — never interpolate a ref into the shell
        run: |
          gh release create "$TAG" \
            --title "Gateway $TAG" \
            --notes "Signed, provenanced, reproducible release. Verify with cosign / gh attestation verify (NFR-7)." \
            || echo "release already exists — uploading assets"
          gh release upload "$TAG" --clobber \
            "$BIN" \
            "${BIN}.cdx.json" \
            "${BIN}.cosign.sigstore.json" \
            "${BIN}.cdx.json.cosign.sigstore.json" \
            "${BIN}.provenance.sigstore.json" \
            SHA256SUMS
