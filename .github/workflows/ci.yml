name: ci

on:
  push:
  pull_request:

# Least privilege: the gate only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref so a hung/old build does not sit in the
# queue or run to the 6h default.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The required status check is literally `gate`. Do NOT rename this job, add a
  # matrix, or set a custom `name:` — a mismatch hangs branch-protection
  # auto-merge. One job, one gate.
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Toolchain pinned to match rust-toolchain.toml (1.95.0). dtolnay's action
      # requires an explicit `toolchain` input (it does not read the toml), so
      # keep this in sync with rust-toolchain.toml.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master (pinned)
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy
          # S24 Part C / CARRYFORWARDS B4: prove the arm64 build compiles in CI (the
          # Tier-0 hardening constants were cfg-gated for aarch64 in S23; nothing
          # verified it at build level until now).
          targets: aarch64-unknown-linux-gnu

      - name: Cache cargo build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # protoc: needed by build.rs (tonic-prost-build shells out to protoc).
      # nextest / cargo-deny / cargo-audit: used by scripts/gate.sh.
      - name: Install gate tools (protoc, nextest, cargo-deny, cargo-audit)
        uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb # v2
        with:
          tool: protoc,cargo-nextest,cargo-deny,cargo-audit

      - name: Run gate
        run: ./scripts/gate.sh

      # aarch64 cross-check (S24 Part C / CARRYFORWARDS B4): the arm64 build was
      # code-supported + statically verified in S23 but never compiled in CI. A
      # `check` (not a full link) is enough to prove the cfg-gated hardening
      # constants + every dep resolve on aarch64. ring/build scripts compile target
      # asm, so the aarch64 cross-toolchain is required even for `check`.
      - name: aarch64 cross-check
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          sudo apt-get update
          # gcc-aarch64-linux-gnu is the cross compiler; libc6-dev-arm64-cross adds the
          # target libc headers/objects in the cross sysroot (without it the cross-gcc
          # falls back to the host /usr/include and ring's C build fails on
          # bits/libc-header-start.h).
          sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu libc6-dev-arm64-cross
          cargo check --workspace --all-features --target aarch64-unknown-linux-gnu
