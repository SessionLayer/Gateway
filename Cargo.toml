[workspace]
resolver = "2"
members = ["gateway", "gateway-core"]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.95"
license = "GPL-3.0-only"
repository = "https://github.com/SessionLayer/Gateway"
authors = ["SessionLayer"]

# Tier-0 invariant, uniform across every crate (lib and binaries): no first-party
# `unsafe`. `forbid` cannot be locally overridden. Dependencies are unaffected
# (that is expected — this governs our code only).
[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.dependencies]
gateway-core = { path = "gateway-core", version = "0.1.0" }

# Async runtime. Multi-threaded tokio is the process base; the io_uring reactor
# (behind gateway-core's `io-uring` feature) is a per-connection concern behind
# the AsyncIo seam, not the runtime. `sync` carries the renew-ahead loop's
# manual-trigger / shutdown channels (Session Four).
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "io-util", "signal", "time", "sync", "fs"] }
tokio-stream = { version = "0.1", features = ["net"] }

# CP <-> Gateway gRPC, generated from the frozen contract (proto/). tonic 0.14
# split the prost integration into tonic-prost / tonic-prost-build. `tls-ring`
# (Session Four) enables the tokio-rustls transport with the *ring* provider —
# deliberately NOT aws-lc-rs, to avoid a C/asm build toolchain + license churn.
tonic = { version = "0.14", features = ["tls-ring"] }
tonic-prost = "0.14"
tonic-prost-build = "0.14"
prost = "0.14"

# TLS. Pinned from Session One so the supply chain is audited from day one; the
# CP<->GW mTLS channel is built in Session Four on the *ring* provider (no
# aws-lc-rs). `logging`/`std` are the non-provider bits we rely on.
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "logging"] }

# X.509 identity: local ECDSA P-256 keypair + PKCS#10 CSR generation (the
# Gateway sends only a CSR; its mTLS private key never leaves — D2/§15). Also the
# mock-CP internal CA in tests. `ring` backend (NOT aws_lc_rs); `pem` for the
# tonic client-identity PEM.
rcgen = { version = "0.14", default-features = false, features = ["ring", "pem"] }

# Outer SSH leg: the Gateway's SSH server (accept + transport + auth handshake).
# Session Seven — the outer leg only (inner-leg client is Session Eight). `ring`
# crypto backend to match the rest of the TLS stack (no aws-lc-rs C/asm
# toolchain); no default features to keep the surface minimal.
russh = { version = "0.62", default-features = false, features = ["ring"] }

# Inner-leg SSH keypair + OpenSSH wire encoding (the ecdsa-sha2-nistp256 public
# blob the CP signs) + OpenSSH certificate assembly (mock session CA in tests).
# `ed25519` powers the outer-leg host key (the standard SSH host-key algorithm).
ssh-key = { version = "0.6", default-features = false, features = ["ecdsa", "ed25519", "p256", "std", "getrandom"] }
# `OsRng` for inner-keypair generation + renew-ahead jitter (rand_core 0.6, the
# version ssh-key 0.6 speaks — kept aligned deliberately).
rand_core = { version = "0.6", features = ["getrandom"] }

# Single-writer advisory lock on the credential data-dir (§8.2): two Gateway
# processes must not race the generation counter.
fd-lock = "4"
# Scrub private-key / secret buffers (Tier-0 caution).
zeroize = "1"
# DER -> PEM for the tonic client Identity (enrollment returns cert DER).
pem = "3"

# Session Nine recorder crypto (§12/§15). All RustCrypto (MIT/Apache), already in
# the dependency graph; `rsa` is deliberately NOT enabled (audit-ignored precisely
# because it is never compiled). ECIES-P256 seals the per-recording AES-256-GCM
# data key to the customer-held public key so no platform key can unwrap it.
#   * p256 (ecdh + pkcs8): ephemeral-static ECDH + DER-SPKI customer key parsing.
#   * hkdf + sha2: HKDF-SHA256 key derivation + the hash-chain / streaming digest.
#   * aes-gcm: the AES-256-GCM data + key-wrap cipher (zeroizing key schedule).
p256 = { version = "0.13", default-features = false, features = ["ecdh", "pkcs8", "std"] }
hkdf = "0.13"
sha2 = "0.11"
aes-gcm = { version = "0.11", features = ["zeroize"] }

# Session Nine WORM upload: a dumb HTTP PUT of the ciphertext object to the
# CP-issued presigned URL. hyper (+util) are already transitive via tonic; no
# reqwest / webpki-roots (MPL-2.0). https uses the existing rustls (ring) stack.
hyper = { version = "1", default-features = false, features = ["client", "http1"] }
hyper-util = { version = "0.1", default-features = false, features = ["tokio"] }
http-body = "1"
http-body-util = "0.1"
bytes = "1"
tokio-rustls = { version = "0.26", default-features = false, features = ["ring"] }

# Observability.
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

# Ser/de, errors, CLI.
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
anyhow = "1"
clap = { version = "4", features = ["derive"] }

[profile.release]
# Tier-0 data plane: keep integer-overflow checks on even in release. A
# byte-shoveling proxy must not silently wrap a length/offset. Cheap insurance.
overflow-checks = true
