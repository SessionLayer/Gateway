syntax = "proto3";

package sessionlayer.controlplane.v1;

option java_multiple_files = true;
option java_package = "io.sessionlayer.controlplane.grpc.v1";
option java_outer_classname = "AuthProto";

// OuterLegAuth is the Control Plane's outer-leg AUTHENTICATION service: it
// resolves an SSH-outer-leg credential the Gateway received (a Vault user cert,
// a pinned public key, a pre-issued OTP, or an approved OIDC device flow) to a
// CP-owned {identity, principals} (Design §5.1-§5.5; FR-AUTH-1..5, FR-AUTH-9/10,
// FR-CA-2). Added in Session Seven, over the Session Six services (OTP, pins,
// device flow, user-facing CA).
//
// AUTHENTICATION ONLY, NEVER AUTHORIZATION. These RPCs answer only "who is
// this?"; they never grant access. On success the Gateway still calls
// Authorization.Authorize for the target node (invariant I2 — a pin/OTP/cert is
// an authN shortcut; every reconnect re-runs full authorization). The CP maps
// identity -> principals; the Gateway MUST use only what the CP returns and MUST
// NOT trust any client-claimed principal (Design §5.3, §2 step 3).
//
// TIER. Every RPC here is on the identity/session (mTLS-required) tier of the
// control plane: the AuthInterceptor requires the caller's Gateway mTLS client
// certificate. Only an authenticated Gateway may resolve credentials.
//
// NON-DISCLOSURE (§7.1, FR-AUTH-16). Resolution failure is generic: the Resolve*
// RPCs return `resolved = false` with no identity for ANY reason (unknown /
// expired / wrong-source / rate-limited / malformed) — the caller is never told
// which, so the outer-leg auth surface reveals no existence. Reasons go only to
// the decision log. Source IP is a DENY-ONLY reducer everywhere (FR-AUTH-15) —
// it can suppress a resolution, never grant one.
service OuterLegAuth {
  // ResolveUserCert validates a presented OpenSSH user certificate against the
  // user-facing CA (Design §3.1, the Vault-user-cert path) and resolves the
  // identity + cert-scoped principals. A cert that does not chain to a trusted
  // user CA, is outside its validity window, or is otherwise unusable resolves
  // to `resolved = false` (generic).
  rpc ResolveUserCert(ResolveUserCertRequest) returns (ResolveUserCertResponse);

  // ResolvePin resolves a pinned public-key fingerprint to its bound identity
  // (Design §5.5, FR-AUTH-10). The pin is source-CIDR bound (deny-only) and
  // must be unexpired and unrevoked; otherwise `resolved = false`.
  rpc ResolvePin(ResolvePinRequest) returns (ResolvePinResponse);

  // ResolveOtp validates a pre-issued single-use OTP (Design §5.4, FR-AUTH-9):
  // constant-time, single-use (atomic mark-used), source-bound, rate-limited.
  // The identity comes from the OTP record, never from client input. A replayed,
  // expired, wrong-source, or throttled code resolves to `resolved = false`.
  rpc ResolveOtp(ResolveOtpRequest) returns (ResolveOtpResponse);

  // BeginDeviceFlow starts the fallback OIDC device flow (Design §5.2,
  // FR-AUTH-3/5). The CP mints the codes and hosts the verification page as an
  // auth-code + PKCE relying party (the anti-phishing design). The Gateway shows
  // user_code + verification_uri in the keyboard-interactive instruction and
  // polls PollDeviceFlow with device_code. source_ip is bound for the
  // approving-browser correlation (deny-only) and rate-limiting.
  rpc BeginDeviceFlow(BeginDeviceFlowRequest) returns (BeginDeviceFlowResponse);

  // PollDeviceFlow reports the flow's status by its device_code; on APPROVED it
  // carries the resolved identity. Rate-limited: a throttled poll fails with
  // RESOURCE_EXHAUSTED (the Gateway backs off and keeps its num-prompts=0
  // heartbeat alive, FR-AUTH-4). An unknown device_code reports EXPIRED (generic,
  // no existence disclosure).
  rpc PollDeviceFlow(PollDeviceFlowRequest) returns (PollDeviceFlowResponse);

  // ResolveBreakglassKey resolves a registered break-glass FIDO2 `sk-ecdsa` PUBLIC
  // key to its break-glass identity + scoped principals, INDEPENDENT of the primary
  // OIDC IdP (Design §5.2/§7, FR-ACC-6). The key is public and russh has already
  // verified the FIDO POSSESSION signature before the Gateway calls this (proving the
  // hardware authenticator, whose private key never leaves it, is present) — the CP
  // only maps the key to its registered break-glass credential. NOTE: touch
  // (user-presence) is enforced by the AUTHENTICATOR for a standard touch-required
  // sk key; it is NOT asserted server-side (this russh does not expose the sk flags),
  // so break-glass keys MUST be provisioned touch-required (never `-O no-touch-required`).
  // On success it mints a single-use `breakglass_token` (in BreakglassResolution)
  // that authorises exactly one break-glass Authorize. A key that is unknown,
  // revoked, expired, or out-of-source resolves to `resolved = false` with no token
  // (generic, §7.1). This is the primary break-glass auth path. Added in Session 13.
  rpc ResolveBreakglassKey(ResolveBreakglassKeyRequest) returns (ResolveBreakglassKeyResponse);

  // ResolveBreakglassCode validates a pre-issued single-use break-glass OFFLINE CODE
  // (Design §7, FR-ACC-6) — the IdP-independent FALLBACK when no FIDO2 authenticator
  // is available. The code is looked up by its SHA-256 hash (the raw code is never
  // stored nor compared in the clear) and consumed by an atomic single-use UPDATE;
  // it is source-bound and the identity comes from the code record, never client
  // input. A ≥128-bit code makes the hash-existence timing side-channel useless. The
  // `code` field is a SECRET (entered over keyboard-interactive with echo off) —
  // NEVER log it. On success it mints a single-use `breakglass_token`; a replayed,
  // expired, wrong-source, or unknown code resolves to `resolved = false` with no
  // token (generic). Added in Session 13.
  rpc ResolveBreakglassCode(ResolveBreakglassCodeRequest) returns (ResolveBreakglassCodeResponse);
}

// ResolvedIdentity is the CP's authentication result: the identity a credential
// resolved to, plus the principal/group context that feeds Authorize. It is the
// ONLY source of principal for the connection (the client never chooses one).
message ResolvedIdentity {
  // Whether the credential resolved. false is the single, generic non-resolution
  // outcome (§7.1) — the caller is told nothing more.
  bool resolved = 1;

  // The resolved subject identity (e.g. an OIDC subject / username). Empty when
  // resolved = false. Fed to Authorize.identity.
  string identity = 2;

  // The Linux logins this CREDENTIAL is scoped to (cert principals / the OTP or
  // pin record's allowed principals). A deny-only reducer the Gateway applies on
  // top of the RBAC-allowed logins: the requested login must be within both.
  // May be empty (e.g. device flow, where RBAC alone decides the logins).
  repeated string principals = 3;

  // The identity's SSO/OIDC groups, for group-based RBAC selectors. Fed to
  // Authorize.identity_groups. May be empty.
  repeated string groups = 4;
}

// ResolveUserCertRequest carries the presented outer-leg certificate.
message ResolveUserCertRequest {
  // The OpenSSH user certificate the client presented on the outer leg, as the
  // raw OpenSSH wire blob (the base64 body of an `...-cert-v01@openssh.com`
  // authorized-keys entry). Not a secret — a certificate is public — but the CP
  // validates it fully before trusting anything in it.
  bytes certificate_blob = 1;

  // The client source IP (single address). Deny-only reducer (FR-AUTH-15).
  string source_ip = 2;
}

// ResolveUserCertResponse wraps the authentication result (unique per RPC to
// satisfy the request/response-uniqueness contract).
message ResolveUserCertResponse {
  ResolvedIdentity identity = 1;
}

// ResolvePinRequest carries the offered public key's fingerprint.
message ResolvePinRequest {
  // SHA-256 fingerprint of the public key the client offered (OpenSSH
  // `SHA256:...` form). The pin store is keyed by this; the raw key is not sent.
  string public_key_fingerprint = 1;

  // The client source IP. The pin is source-CIDR bound (deny-only, FR-AUTH-15).
  string source_ip = 2;
}

// ResolvePinResponse wraps the authentication result.
message ResolvePinResponse {
  ResolvedIdentity identity = 1;
}

// ResolveOtpRequest carries the presented OTP. The `otp` field is a SECRET
// (delivered over keyboard-interactive with echo off) — NEVER log it.
message ResolveOtpRequest {
  // The one-time code the user typed. Secret; validated constant-time and
  // single-use, then consumed. Must never appear in a log or trace.
  string otp = 1;

  // The client source IP. The OTP is source-CIDR bound (deny-only, FR-AUTH-15).
  string source_ip = 2;
}

// ResolveOtpResponse wraps the authentication result.
message ResolveOtpResponse {
  ResolvedIdentity identity = 1;
}

// BeginDeviceFlowRequest starts a device flow bound to the SSH source.
message BeginDeviceFlowRequest {
  // The client source IP, bound into the flow for the approving-browser
  // correlation (deny-only, §5.2) and the poll rate-limit key.
  string source_ip = 1;
}

// BeginDeviceFlowResponse carries what the Gateway needs to drive the flow: the
// user-facing prompt material and the secret device_code it polls with.
message BeginDeviceFlowResponse {
  // The secret code the Gateway polls PollDeviceFlow with. NOT shown to the
  // user; correlates 1:1 with this SSH connection (anti-phishing binding, §15).
  string device_code = 1;

  // The short code the user reads and enters on the verification page. Shown in
  // the keyboard-interactive instruction (FR-AUTH-3).
  string user_code = 2;

  // The CP verification page URL the user opens (the CP-hosted auth-code+PKCE RP,
  // §5.2). Shown in the keyboard-interactive instruction.
  string verification_uri = 3;

  // Minimum seconds between polls (RFC 8628 interval). The Gateway honours this;
  // a faster poll is throttled (RESOURCE_EXHAUSTED).
  int32 interval_seconds = 4;

  // Seconds until the flow expires. After this the flow reports EXPIRED and the
  // Gateway surfaces the §7.1 "authentication timed out" outcome.
  int32 expires_in_seconds = 5;
}

// PollDeviceFlowRequest carries the secret device_code.
message PollDeviceFlowRequest {
  // The device_code returned by BeginDeviceFlow. Secret; identifies the flow.
  string device_code = 1;
}

// PollDeviceFlowResponse reports the flow status and, on APPROVED, the identity.
message PollDeviceFlowResponse {
  // The current status of the flow.
  DeviceFlowStatus status = 1;

  // The resolved identity + principal/group context. Populated (resolved = true)
  // only when status = APPROVED; otherwise resolved = false.
  ResolvedIdentity identity = 2;
}

// DeviceFlowStatus is the device-flow lifecycle state the Gateway acts on.
enum DeviceFlowStatus {
  DEVICE_FLOW_STATUS_UNSPECIFIED = 0;
  // The user has not yet completed the verification page. Keep polling +
  // heartbeat.
  DEVICE_FLOW_STATUS_PENDING = 1;
  // The user approved on the verification page; `identity` is populated.
  DEVICE_FLOW_STATUS_APPROVED = 2;
  // The flow was denied (e.g. enforced source-context mismatch). Generic denial.
  DEVICE_FLOW_STATUS_DENIED = 3;
  // The flow expired (timed out) or the device_code is unknown. -> §7.1 timeout.
  DEVICE_FLOW_STATUS_EXPIRED = 4;
}

// BreakglassResolution is the break-glass authentication result (Design §7,
// FR-ACC-6): the resolved break-glass identity + scoped principals, plus a single-
// use token the Gateway presents to Authorize to open exactly one break-glass
// session. AUTHENTICATION ONLY — the alert, the breakglass_activation record, and the
// forced-strict/Lock-checked authorization all happen at Authorize (on actual use),
// symmetric with how the other Resolve* RPCs authenticate without granting access.
message BreakglassResolution {
  // The resolved identity. resolved = false is the single generic non-resolution
  // outcome (§7.1); no token is minted on failure (fail closed).
  ResolvedIdentity identity = 1;

  // A single-use, short-lived break-glass token bound to {gateway (the authenticated
  // mTLS caller), identity, node, source_ip, exp}. Presented as
  // AuthorizeRequest.breakglass_token and consumed atomically at Authorize, which then
  // creates the breakglass_activation, fires the high-priority alert, forces
  // access_model = BREAKGLASS + strict recording, and evaluates the break-glass allow
  // SUBJECT TO the top-tier Lock (a Lock still denies — deny wins). Empty when
  // resolved = false.
  string breakglass_token = 2;
}

// ResolveBreakglassKeyRequest carries the offered break-glass FIDO2 sk-ecdsa key.
message ResolveBreakglassKeyRequest {
  // The OpenSSH `sk-ecdsa-sha2-nistp256@openssh.com` PUBLIC key the client offered,
  // as the raw OpenSSH wire blob (the base64 body of the authorized-keys entry).
  // PUBLIC material — the CP matches it to a registered break-glass credential.
  bytes sk_public_key_blob = 1;

  // The client source IP (single address). Deny-only reducer (FR-AUTH-15).
  string source_ip = 2;

  // The fixed target node id (UUID) this break-glass connection is for. Scopes the
  // credential (a credential may be node-scoped) and binds the minted token. An empty
  // value is tolerated for a fleet-scoped break-glass credential.
  string node_id = 3;
}

message ResolveBreakglassKeyResponse {
  BreakglassResolution resolution = 1;
}

// ResolveBreakglassCodeRequest carries the presented break-glass offline code. The
// `code` field is a SECRET (keyboard-interactive, echo off) — NEVER log it.
message ResolveBreakglassCodeRequest {
  // The one-time break-glass code the user typed. Secret; matched by SHA-256 hash
  // (never compared in the clear) and consumed single-use. Must never appear in a
  // log or trace.
  string code = 1;

  // The client source IP. The code is source-bound (deny-only, FR-AUTH-15).
  string source_ip = 2;

  // The fixed target node id (UUID) this break-glass connection is for (scope + token
  // binding). Empty tolerated for a fleet-scoped code.
  string node_id = 3;
}

message ResolveBreakglassCodeResponse {
  BreakglassResolution resolution = 1;
}
