syntax = "proto3";

package sessionlayer.controlplane.v1;

import "sessionlayer/controlplane/v1/common.proto";

option java_multiple_files = true;
option java_package = "io.sessionlayer.controlplane.grpc.v1";
option java_outer_classname = "IdentityProto";

// GatewayIdentity is the Control Plane service that bootstraps and renews a
// Gateway's CP-facing mTLS X.509 identity (Design §2A "Gateway↔CP trust", §8
// credential lifecycle; FR-BOOT-3, FR-JOIN-3, FR-JOIN-4). It is added in Session
// Four alongside the mTLS transport.
//
// TRUST MODEL. The whole CP<->Gateway gRPC plane runs over TLS 1.3 and the CP
// always presents a server certificate issued by the internal mTLS CA. Client
// (Gateway) certificate authentication is REQUIRED for every RPC EXCEPT
// EnrollGateway: a Gateway that has not yet enrolled has no CP-issued client
// certificate, so EnrollGateway is authenticated by the single-use enrollment
// token instead (the documented bootstrap exception). Every other RPC on this
// plane — RenewGatewayIdentity, Handshake.Negotiate for an enrolled peer, and
// SessionSigning.SignSessionCertificate — is refused without a valid client
// certificate chained to the internal CA that resolves to an active, unlocked
// gateway_identity. All rejection paths fail closed (NFR-2).
//
// KEY CUSTODY. The Gateway generates its mTLS keypair locally and sends only a
// PKCS#10 CSR (public key + proof of possession). The CP returns a signed
// certificate; the Gateway's mTLS private key never leaves the Gateway (mirrors
// the inner-leg key-custody rule, D2/§15).
service GatewayIdentity {
  // EnrollGateway consumes a single-use enrollment token and issues the
  // Gateway's first renewable mTLS identity (generation 0), writing
  // gateway_identity. The token is verified and atomically consumed (replay is
  // rejected). Reachable without a client certificate (bootstrap exception).
  rpc EnrollGateway(EnrollGatewayRequest) returns (EnrollGatewayResponse);

  // RenewGatewayIdentity rotates the caller's mTLS certificate and increments
  // the generation counter (persist-before-adopt on the Gateway side). REQUIRES
  // the caller's current mTLS client certificate; a locked/revoked identity or a
  // generation mismatch is refused and flagged (§8.2). Renew-ahead per FR-JOIN-4.
  rpc RenewGatewayIdentity(RenewGatewayIdentityRequest) returns (RenewGatewayIdentityResponse);
}

// EnrollGatewayRequest carries the bootstrap credential and the CSR.
message EnrollGatewayRequest {
  // The single-use, short-TTL enrollment token issued out-of-band by an operator
  // (the bootstrap credential, §4.B). Bearer credential for this RPC only.
  string enrollment_token = 1;

  // A PKCS#10 CertificationRequest (DER) generated by the Gateway. The CP
  // receives only the CSR and returns a signed cert; the private key stays on the
  // Gateway.
  bytes pkcs10_csr = 2;

  // The connecting Gateway's identity/version, for diagnostics and version
  // negotiation. Carries NO secrets.
  ComponentInfo client = 3;

  // The stable Gateway name the operator provisioned the token for. The CP binds
  // this into gateway_identity.name and the issued certificate's SAN; a mismatch
  // between this, the token's scope, and the CSR subject fails closed.
  string gateway_name = 4;
}

// EnrollGatewayResponse returns the issued identity certificate and trust chain.
message EnrollGatewayResponse {
  // The issued mTLS X.509 leaf certificate (DER).
  bytes certificate = 1;

  // The issuing CA chain (DER; issuing CA first, root last). The Gateway pins
  // this as the trust anchor for the CP's server certificate and uses the leaf +
  // its private key to present its own client certificate thereafter.
  repeated bytes ca_chain = 2;

  // The CP-assigned gateway identity id (UUID string) — the stable principal id.
  string gateway_id = 3;

  // Generation counter of the issued identity. Enrollment always issues 0.
  uint64 generation = 4;

  // Certificate validity as Unix epoch seconds (UTC). not_before is backdated for
  // clock skew (FR-BOOT-4). The Gateway expires the credential conservatively.
  int64 not_before_epoch_seconds = 5;
  int64 not_after_epoch_seconds = 6;
}

// RenewGatewayIdentityRequest rotates an existing identity. Authenticated by the
// caller's CURRENT mTLS client certificate (not a token).
message RenewGatewayIdentityRequest {
  // A fresh PKCS#10 CSR (DER) for the renewed identity.
  bytes pkcs10_csr = 1;

  // The generation the Gateway currently holds. The CP issues current_generation
  // + 1 and enforces monotonicity; a mismatch is a security event (§8.2, refused
  // and flagged) rather than a silent pass.
  uint64 current_generation = 2;

  // The caller's identity/version. Carries NO secrets.
  ComponentInfo client = 3;
}

// RenewGatewayIdentityResponse mirrors EnrollGatewayResponse with the new
// generation.
message RenewGatewayIdentityResponse {
  bytes certificate = 1;
  repeated bytes ca_chain = 2;
  string gateway_id = 3;

  // The new generation (== current_generation + 1).
  uint64 generation = 4;

  int64 not_before_epoch_seconds = 5;
  int64 not_after_epoch_seconds = 6;
}
